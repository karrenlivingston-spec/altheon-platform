# Render.com — optional Blueprint / reference (see Render docs for your account).
#
# --- Cron job: daily survey SMS at 7 PM Eastern team window ---
# In the Render Dashboard: New → Cron Job (or add to this file per Render cron spec).
#
#   Command:  curl -f -X POST https://altheon-platform.onrender.com/send-survey-sms
#   Schedule: 0 23 * * *
#   (23:00 UTC — align with your practice’s Eastern-time policy; adjust for DST if needed.)
#
# --- Cron job: intake reminders (initial ~48h + follow-up ~24h before appointment) ---
#
#   Command:  curl -f -X POST https://altheon-platform.onrender.com/intake/send-reminders
#   Schedule: 0 6,12,18 * * *
#   (06:00, 12:00, and 18:00 UTC daily — three passes to hit 47–49h and 23–25h windows.)
#
# Ensure the web service has env: TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN,
# TWILIO_MESSAGING_SERVICE_SID, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
# FRONTEND_URL, etc.

# --- Cron job: appointment reminders (48h + 24h before scheduled visit) ---
#
#   Service:  altheon-appointment-reminders-cron
#   Command:  curl -f -X POST https://altheon-platform.onrender.com/appointment-reminders/send-reminders
#   Schedule: 0 8,14,20 * * *
#   (08:00, 14:00, and 20:00 UTC daily — three passes to hit 47–49h and 23–25h windows.)

# --- Cron job: unified system tasks reconcile ---
#
#   Service:  reconcile-system-tasks
#   Command:  curl -f -X POST -H "X-Intake-Secret: $INTAKE_SECRET" https://altheon-platform.onrender.com/tasks/reconcile-system-tasks
#   Schedule: */20 * * * *
#   (Every 20 minutes UTC — all clinics; set INTAKE_SECRET on this cron job, same value as web service.)

# --- Cron job: ERA remittance polling fallback ---
#
#   Service:  era-remittance-poll
#   Command:  curl -f -X POST -H "X-Intake-Secret: $INTAKE_SECRET" "https://altheon-platform.onrender.com/api/era/poll?clinic_id=$ERA_DEFAULT_CLINIC_ID"
#   Schedule: */30 * * * *
#   Set on this cron job directly (not inherited from web service):
#     INTAKE_SECRET, ERA_DEFAULT_CLINIC_ID, STEDI_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

services:
  - type: cron
    name: altheon-appointment-reminders-cron
    schedule: "0 8,14,20 * * *"
    startCommand: curl -f -X POST https://altheon-platform.onrender.com/appointment-reminders/send-reminders
  - type: cron
    name: reconcile-system-tasks
    schedule: "*/20 * * * *"
    startCommand: curl -f -X POST -H "X-Intake-Secret: $INTAKE_SECRET" https://altheon-platform.onrender.com/tasks/reconcile-system-tasks
  - type: cron
    name: era-remittance-poll
    schedule: "*/30 * * * *"
    startCommand: curl -f -X POST -H "X-Intake-Secret: $INTAKE_SECRET" "https://altheon-platform.onrender.com/api/era/poll?clinic_id=$ERA_DEFAULT_CLINIC_ID"
    envVars:
      - key: INTAKE_SECRET
        sync: false
      - key: ERA_DEFAULT_CLINIC_ID
        sync: false
      - key: STEDI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
